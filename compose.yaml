services:
  portfolio:
    image: nginx:alpine
    container_name: donngas-portfolio
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    ports:
      - "${LOCAL_PORT:-8234}:80"

networks:
  default:
    name: portfolio-network
